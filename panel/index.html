<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Bot Ultra-Premium</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top right, #0f172a, #020617);
            color: #f8fafc;
            font-family: 'Fira Sans', sans-serif;
            min-height: 100vh;
        }

        h1, h2, h3, .font-code { font-family: 'Fira Code', monospace; }

        .glass {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.4);
        }

        .card-glow:hover {
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
            background: rgba(15, 23, 42, 0.6);
        }

        .tag-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] { -moz-appearance: textfield; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }

        @keyframes pulse-fast {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.98); }
        }
        .animate-pulse-fast { animation: pulse-fast 0.8s infinite ease-in-out; }
    </style>
    <audio id="alarm-sound" loop src="https://actions.google.com/sounds/v1/alarms/emergency_siren.ogg"></audio>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const EquityChart = ({ data }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartRef.current && data && data.length > 0) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.map(d => d.timestamp.split(' ')[1]),
                            datasets: [{
                                label: 'Patrimonio ARS',
                                data: data.map(d => d.value),
                                borderColor: '#22d3ee',
                                backgroundColor: 'rgba(34, 211, 238, 0.1)',
                                borderWidth: 3,
                                pointRadius: 0,
                                fill: true,
                                tension: 0.4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.4)', font: { size: 10 } } },
                                x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.4)', font: { size: 10 } } }
                            }
                        }
                    });
                }
            }, [data]);

            return <canvas ref={chartRef}></canvas>;
        };

        function App() {
            const [status, setStatus] = useState({ positions: {}, opportunities: {}, history: [], balances: {}, equity_history: [] });
            const [config, setConfig] = useState({ strategy: {}, watchlist: [] });
            const [editConfig, setEditConfig] = useState(null);
            const [newSymbol, setNewSymbol] = useState("");
            const [notification, setNotification] = useState({ show: false, message: "", type: "info" });

            const fetchStatus = async () => {
                try {
                    const res = await fetch('/api/status');
                    const data = await res.json();
                    setStatus(data);
                } catch (e) { console.error(e); }
            };

            const fetchConfig = async () => {
                try {
                    const res = await fetch('/api/config');
                    const data = await res.json();
                    setConfig(data);
                    setEditConfig(data);
                } catch (e) { console.error(e); }
            };

            const saveConfig = async () => {
                await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(editConfig)
                });
                setNotification({ show: true, message: "✅ Configuración guardada y aplicada.", type: "success" });
                fetchConfig();
            };

            const syncHistory = async () => {
                setNotification({ show: true, message: "Sincronizando con IOL...", type: "info" });
                const res = await fetch('/api/sync_history', { method: 'POST' });
                const data = await res.json();
                setNotification({ show: true, message: data.message, type: 'success' });
                fetchStatus();
            };

            const cancelSL = async (symbol) => {
                await fetch(`/api/cancel_sl?symbol=${symbol}`, { method: 'POST' });
                fetchStatus();
            };

            const manualBuy = async (symbol) => {
                if (!confirm(`¿Comprar ${symbol}?`)) return;
                const res = await fetch(`/api/buy?symbol=${symbol}`, { method: 'POST' });
                const data = await res.json();
                setNotification({ show: true, message: data.message, type: data.status === 'success' ? 'success' : 'error' });
                fetchStatus();
            };

            const addSymbol = async () => {
                if (!newSymbol) return;
                const res = await fetch(`/api/add_symbol?symbol=${newSymbol.toUpperCase()}`, { method: 'POST' });
                const data = await res.json();
                setNewSymbol('');
                fetchConfig();
                setNotification({ show: true, message: data.message, type: 'success' });
            };

            useEffect(() => {
                fetchStatus(); fetchConfig();
                const interval = setInterval(fetchStatus, 5000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                const anyPending = Object.values(status.positions || {}).some(p => p.pending_sl);
                const sound = document.getElementById('alarm-sound');
                if (sound) {
                    if (anyPending) sound.play().catch(() => {});
                    else { sound.pause(); sound.currentTime = 0; }
                }
            }, [status.positions]);

            const securedProfit = Object.values(status.positions || {}).reduce((acc, pos) => {
                if (pos.step > 0) return acc + ((pos.sl - pos.entry_price) * pos.qty * (pos.multiplier || 1));
                return acc;
            }, 0);

            return (
                <div className="max-w-[1800px] mx-auto p-6 space-y-8">
                    {/* NOTIFICATION */}
                    {notification.show && (
                        <div className={`fixed top-10 left-1/2 -translate-x-1/2 z-[100] px-8 py-4 rounded-2xl border backdrop-blur-xl shadow-2xl transition-all duration-500 ${notification.type === 'success' ? 'bg-green-500/10 border-green-500/20 text-green-400' : 'bg-blue-500/10 border-blue-500/20 text-blue-400'}`}>
                            <span className="text-sm font-black font-code">{notification.message}</span>
                            <button onClick={() => setNotification({ ...notification, show: false })} className="ml-4 text-xs opacity-50">✕</button>
                        </div>
                    )}

                    {/* PREMIUM HEADER */}
                    <header className="flex flex-col gap-8">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400 tracking-tighter uppercase italic font-code">Trading Agent <span className="text-white not-italic">Pro</span></h1>
                                <div className="flex items-center gap-3 mt-1 text-slate-500 font-bold uppercase tracking-[0.2em] text-[9px] font-code">
                                    <span className="flex h-1.5 w-1.5 rounded-full bg-green-500 animate-pulse"></span>
                                    Sistema de Alta Frecuencia Activo
                                </div>
                            </div>
                            <div className="flex gap-4">
                                <button 
                                    onClick={() => {
                                        setNotification({ show: true, message: "Actualizando datos...", type: "info" });
                                        fetchStatus();
                                        fetchConfig();
                                    }}
                                    className="px-8 py-4 rounded-2xl font-black uppercase text-[10px] border border-blue-500/30 text-blue-400 bg-blue-500/5 hover:bg-blue-500/10 transition-all font-code tracking-widest shadow-xl"
                                >
                                    🔄 REFRESCAR
                                </button>
                                <button 
                                    onClick={async () => {
                                        const newAuto = !config.auto_buy;
                                        await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({...config, auto_buy: newAuto}) });
                                        fetchConfig();
                                    }}
                                    className={`px-8 py-4 rounded-2xl font-black uppercase text-[10px] border tracking-widest transition-all shadow-2xl font-code ${config.auto_buy ? 'bg-indigo-600/10 border-indigo-500/50 text-indigo-400' : 'bg-red-600 text-white animate-pulse'}`}
                                >
                                    {config.auto_buy ? '🤖 AUTO: ON' : '👤 MANUAL'}
                                </button>
                                <button 
                                    onClick={async () => {
                                        const newStatus = !config.trading_paused;
                                        await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({...config, trading_paused: newStatus}) });
                                        fetchConfig();
                                    }}
                                    className={`px-8 py-4 rounded-2xl font-black text-[10px] uppercase border tracking-widest transition-all font-code ${config.trading_paused ? 'bg-red-600 text-white' : 'bg-slate-900 text-slate-500 border-slate-800'}`}
                                >
                                    {config.trading_paused ? '🚨 REANUDAR' : '🛡️ PAUSAR'}
                                </button>
                            </div>
                        </div>

                        {/* GLOBAL PERFORMANCE BAR - FILA 1 (3 FICHAS) */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            <div className="glass p-5 rounded-[2rem] border border-indigo-500/20 bg-indigo-500/[0.02]">
                                <span className="text-[13px] font-medium text-indigo-300 uppercase tracking-[0.4em] mb-1 block font-code">Inversión Inicial</span>
                                <div className="text-4xl font-black text-white font-code tracking-tighter text-right">${Math.round(config.strategy?.total_invested || 0).toLocaleString()}</div>
                                <div className="text-[13px] font-bold text-emerald-400 font-code mt-1 text-right">u$d {Math.round(config.strategy?.total_invested_usd || 0).toLocaleString()} <span className="text-[10px] text-slate-400">(Hist.)</span></div>
                            </div>
                            
                            <div className="glass p-5 rounded-[2rem] border border-cyan-500/20 bg-cyan-500/[0.02]">
                                <span className="text-[13px] font-medium text-cyan-300 uppercase tracking-[0.4em] mb-1 block font-code">Patrimonio Real</span>
                                <div className="text-4xl font-black text-white font-code tracking-tighter text-right">${Math.round(status.balances?.total_pesos || 0).toLocaleString()}</div>
                                <div className="text-[13px] font-bold text-emerald-400 font-code mt-1 text-right">u$d {Math.round(status.balances?.total_usd || 0).toLocaleString()} (Hoy)</div>
                            </div>

                            <div className={`glass p-5 rounded-[2rem] border ${status.balances?.total_pesos >= config.strategy?.total_invested ? 'border-emerald-500/20 bg-emerald-500/[0.02]' : 'border-rose-500/20 bg-rose-500/[0.02]'}`}>
                                <span className="text-[13px] font-medium uppercase tracking-[0.4em] mb-1 block font-code text-slate-300">Rendimiento Global</span>
                                <div className={`text-4xl font-black font-code tracking-tighter text-right ${status.balances?.total_pesos >= config.strategy?.total_invested ? 'text-emerald-400' : 'text-rose-400'}`}>
                                    {(((status.balances?.total_pesos || 0) / (config.strategy?.total_invested || 1) - 1) * 100).toFixed(2)}%
                                </div>
                                <div className="flex justify-between items-center mt-1">
                                    <span className="text-[11px] font-bold text-slate-400 font-code uppercase tracking-widest">ARS</span>
                                    <div className="text-[13px] font-bold text-emerald-400 font-code text-right">
                                        u$d {(( (status.balances?.total_usd || 0) / (config.strategy?.total_invested_usd || 1) - 1 ) * 100).toFixed(2)}%
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* GLOBAL PERFORMANCE BAR - FILA 2 (4 FICHAS) */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div className="glass p-4 rounded-3xl border border-blue-500/20 bg-blue-500/[0.02]">
                                <span className="text-[13px] font-black text-blue-300 uppercase tracking-[0.4em] mb-1 block font-code">Efectivo (T0)</span>
                                <div className="text-3xl font-black text-white font-code tracking-tighter text-right">${Math.round(status.balances?.t0 || 0).toLocaleString()}</div>
                            </div>

                            <div className="glass p-4 rounded-3xl border border-slate-800/50">
                                <span className="text-[13px] font-black text-slate-400 uppercase tracking-[0.4em] mb-1 block font-code">A Liquidar (T2)</span>
                                <div className="text-3xl font-black text-slate-200 font-code tracking-tighter text-right">${Math.round(status.balances?.t2 || 0).toLocaleString()}</div>
                            </div>

                            {/* PROFIT PROYECTADO */}
                            {(() => {
                                const unrealizedProfit = Object.values(status.positions || {}).reduce((acc, pos) => {
                                    const current = pos.current_price || pos.entry_price;
                                    return acc + ((current - pos.entry_price) * pos.qty * (pos.multiplier || 1));
                                }, 0);
                                const isPositive = unrealizedProfit >= 0;

                                return (
                                    <div className={`glass p-4 rounded-3xl border ${isPositive ? 'border-emerald-500/20 bg-emerald-500/[0.02]' : 'border-rose-500/20 bg-rose-500/[0.02]'}`}>
                                        <span className={`text-[13px] font-black uppercase tracking-[0.4em] mb-1 block font-code ${isPositive ? 'text-emerald-400' : 'text-rose-400'}`}>Profit Proyectado</span>
                                        <div className={`text-3xl font-black font-code tracking-tighter text-right ${isPositive ? 'text-emerald-400' : 'text-rose-400'}`}>
                                            ${Math.round(unrealizedProfit).toLocaleString()}
                                        </div>
                                    </div>
                                );
                            })()}

                            {/* PROFIT ASEGURADO */}
                            <div className="glass p-4 rounded-3xl border border-blue-400/20 bg-blue-400/[0.02]">
                                <span className="text-[13px] font-black text-blue-300 uppercase tracking-[0.4em] mb-1 block font-code">Profit Asegurado</span>
                                <div className="text-3xl font-black text-white font-code tracking-tighter text-right">
                                    ${Math.round(securedProfit).toLocaleString()}
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* ALERTS */}
                    {Object.entries(status.positions || {}).filter(([_, p]) => p.pending_sl).map(([sym, p]) => (
                        <div key={sym} className="bg-red-600 p-10 rounded-[3rem] flex justify-between items-center shadow-2xl animate-pulse">
                            <div>
                                <h3 className="text-5xl font-black text-white mb-2 uppercase tracking-tighter font-code">⚠️ {sym}</h3>
                                <p className="text-red-100 text-xl font-bold uppercase tracking-widest font-code">Stop Loss Activado - Vendiendo en {p.sl_countdown}s...</p>
                            </div>
                            <button onClick={() => cancelSL(sym)} className="bg-white text-red-600 px-12 py-6 rounded-2xl font-black text-2xl uppercase tracking-widest shadow-xl hover:scale-105 transition active:scale-95 font-code">Cancelar Venta</button>
                        </div>
                    ))}
                    {/* CARTERA ACTIVA (POSICIONES ABIERTAS) */}
                    <section className="space-y-6">
                        <div className="flex justify-between items-end border-l-8 border-indigo-500 pl-6">
                            <div>
                                <h2 className="text-3xl font-black font-code tracking-tighter uppercase italic text-white">Cartera Activa</h2>
                                <p className="text-slate-500 text-[13px] font-code uppercase mt-1">Monitoreo de posiciones en tiempo real</p>
                            </div>
                            <div className="text-right">
                                <span className="text-[11px] font-black text-slate-600 uppercase tracking-widest block mb-1">Costo Estimado Comisiones</span>
                                <span className="text-xl font-black text-rose-400 font-code">1.0% (In/Out)</span>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 gap-6">
                            {Object.entries(status.positions || {}).sort((a, b) => a[0].localeCompare(b[0])).map(([sym, pos]) => {
                                const current = pos.current_price || pos.entry_price;
                                const win = current >= pos.entry_price;
                                const totalInvested = pos.entry_price * pos.qty * (pos.multiplier || 1);
                                const totalCommissions = totalInvested * 0.01; // 1% Total
                                const breakEven = pos.entry_price * 1.01; // Precio para cubrir 1%
                                const netProfit = ((current - pos.entry_price) * pos.qty * (pos.multiplier || 1)) - totalCommissions;

                                return (
                                    <div key={sym} className="glass p-8 rounded-[2.5rem] border border-slate-800/50 flex items-center gap-10 card-glow transition-all relative overflow-hidden group">
                                        <div className={`absolute left-0 top-0 h-full w-2 ${win ? 'bg-emerald-500' : 'bg-rose-500'}`}></div>
                                        
                                        {/* INFO PRINCIPAL */}
                                        <div className="flex-1 min-w-[250px]">
                                            <div className="flex items-center gap-4 mb-3">
                                                <span className="text-6xl font-black tracking-tighter uppercase italic font-code text-white">{sym}</span>
                                                <span className={`text-[12px] px-3 py-1 font-black rounded-xl font-code border ${pos.step > 0 ? 'bg-yellow-400/20 text-yellow-400 border-yellow-400/30' : 'bg-slate-800 text-slate-500 border-slate-700'}`}>
                                                    {pos.step > 1 ? '🔥' : '🧊'} SALTO: {pos.step || 0}
                                                </span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-x-6 gap-y-1 text-[13px] font-code font-bold uppercase tracking-tighter">
                                                <div className="text-slate-500">Entrada: <span className="text-slate-200">${pos.entry_price.toLocaleString()}</span></div>
                                                <div className="text-slate-500">Cantidad: <span className="text-slate-200">{pos.qty}</span></div>
                                                <div className="text-rose-400/80">Comisión: <span className="font-black">-${Math.round(totalCommissions).toLocaleString()}</span></div>
                                                <div className="text-blue-400">Break-even: <span className="font-black">${Math.round(breakEven).toLocaleString()}</span></div>
                                            </div>
                                        </div>

                                        {/* TRAILING PROGRESS */}
                                        <div className="flex-[1.5] px-10">
                                            <div className="flex justify-between text-[11px] text-slate-500 font-black uppercase mb-3 font-code tracking-widest">
                                                <span>Stop Loss: ${Math.round(pos.sl).toLocaleString()}</span>
                                                <span>Take Profit: ${Math.round(pos.tp).toLocaleString()}</span>
                                            </div>
                                            <div className="h-4 bg-slate-950 rounded-full relative overflow-hidden border border-slate-900 shadow-inner">
                                                <div className="absolute top-0 bottom-0 left-0 bg-gradient-to-r from-rose-500/20 via-transparent to-emerald-500/20 w-full"></div>
                                                <div className="absolute top-0 bottom-0 w-2 bg-blue-400 shadow-[0_0_20px_#60a5fa] transition-all duration-500" style={{ left: `${Math.min(Math.max(((current - pos.sl) / (pos.tp - pos.sl)) * 100, 0), 100)}%` }}></div>
                                            </div>
                                            <div className="text-center text-sm font-black text-blue-400 font-code mt-2 tracking-[0.3em] uppercase">Cotización: ${current.toLocaleString()}</div>
                                        </div>

                                        {/* RENDIMIENTO NETO */}
                                        <div className="w-80 text-right bg-slate-900/40 p-6 rounded-[2rem] border border-slate-800/50">
                                            <div className="text-[12px] font-black text-slate-500 uppercase tracking-widest mb-1">Profit Neto (Post-Com.)</div>
                                            <div className={`text-4xl font-black font-code tracking-tighter ${netProfit >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                                {netProfit >= 0 ? '+' : ''}${Math.round(netProfit).toLocaleString()}
                                            </div>
                                            <div className={`text-[13px] font-bold font-code mt-1 ${win ? 'text-emerald-400/60' : 'text-rose-400/60'}`}>
                                                {win ? '▲' : '▼'} {pos.profit_pct?.toFixed(2)}% (Bruto)
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </section>

                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                        {/* COLUMNA IZQUIERDA: GESTIÓN */}
                        <div className="flex flex-col gap-8">
                            {/* CONFIGURACIÓN */}
                            <div className="glass p-10 rounded-[3rem] border border-slate-800/50">
                                <div className="flex justify-between items-center mb-8 border-b border-slate-800/30 pb-6">
                                    <div>
                                        <h2 className="text-3xl font-black text-white font-code uppercase italic tracking-tighter">Motor de Estrategia</h2>
                                        <div className="flex gap-2 mt-3">
                                            {[
                                                {id: 'agresivo', label: '🚀 Agresivo', color: 'rose'},
                                                {id: 'normal', label: '⚖️ Normal', color: 'blue'},
                                                {id: 'conservador', label: '🛡️ Cons.', color: 'emerald'}
                                            ].map(mode => (
                                                <button 
                                                    key={mode.id}
                                                    onClick={() => {
                                                        const presets = {
                                                            agresivo: { initial_sl_pct: 0.99, initial_tp_pct: 1.015, trailing_sl_pct: 0.995, trailing_tp_pct: 1.01 },
                                                            normal: { initial_sl_pct: 0.98, initial_tp_pct: 1.03, trailing_sl_pct: 0.988, trailing_tp_pct: 1.012 },
                                                            conservador: { initial_sl_pct: 0.96, initial_tp_pct: 1.08, trailing_sl_pct: 0.97, trailing_tp_pct: 1.03 }
                                                        };
                                                        setEditConfig({...editConfig, trading_mode: mode.id, strategy: {...editConfig.strategy, ...presets[mode.id]}});
                                                    }}
                                                    className={`px-4 py-2 rounded-xl text-[12px] font-black uppercase tracking-wider transition-all border ${editConfig?.trading_mode === mode.id ? `bg-${mode.color}-500/20 border-${mode.color}-500 text-${mode.color}-400` : 'bg-slate-900 border-slate-800 text-slate-500'}`}
                                                >
                                                    {mode.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={saveConfig} className="bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-2xl font-black text-[12px] uppercase tracking-widest transition shadow-lg shadow-blue-500/20 font-code">Guardar Cambios</button>
                                </div>

                                {editConfig && (
                                    <div className="flex flex-col gap-8">
                                        {/* BLOQUE DE VALORES NUMÉRICOS */}
                                        <div className="grid grid-cols-2 gap-6">
                                            <div className="bg-slate-950/40 p-5 rounded-3xl border border-slate-900/50 border-blue-500/30">
                                                <label className="text-[12px] font-black text-blue-400 uppercase mb-2 block tracking-widest">💰 Inversión por Trade ($)</label>
                                                <input type="number" step="10000" value={editConfig.strategy?.fixed_investment_amount || 0} onChange={e => setEditConfig({...editConfig, strategy: {...editConfig.strategy, fixed_investment_amount: parseInt(e.target.value)}})} className="w-full bg-slate-900 p-4 rounded-xl text-white font-code text-2xl outline-none border border-slate-800 focus:border-blue-500 shadow-inner" />
                                            </div>
                                            <div className="bg-slate-950/40 p-5 rounded-3xl border border-slate-900/50">
                                                <label className="text-[12px] font-black text-slate-400 uppercase mb-2 block tracking-widest">🛑 Stop Loss (%)</label>
                                                <input type="number" step="0.1" value={Math.round((1 - (editConfig.strategy?.initial_sl_pct || 0.98)) * 1000)/10} onChange={e => setEditConfig({...editConfig, strategy: {...editConfig.strategy, initial_sl_pct: 1 - (e.target.value/100)}})} className="w-full bg-slate-900 p-4 rounded-xl text-white font-code text-2xl outline-none border border-slate-800 focus:border-indigo-500" />
                                            </div>
                                            <div className="bg-slate-950/40 p-5 rounded-3xl border border-slate-900/50">
                                                <label className="text-[12px] font-black text-slate-400 uppercase mb-2 block tracking-widest">🎯 Take Profit (%)</label>
                                                <input type="number" step="0.1" value={Math.round(((editConfig.strategy?.initial_tp_pct || 1.015) - 1) * 1000)/10} onChange={e => setEditConfig({...editConfig, strategy: {...editConfig.strategy, initial_tp_pct: 1 + (e.target.value/100)}})} className="w-full bg-slate-900 p-4 rounded-xl text-white font-code text-2xl outline-none border border-slate-800 focus:border-emerald-500" />
                                            </div>
                                            <div className="bg-slate-950/40 p-5 rounded-3xl border border-slate-900/50 border-cyan-500/20">
                                                <label className="text-[12px] font-black text-cyan-400 uppercase mb-2 block tracking-widest">📡 Sensibilidad Radar (Min Score)</label>
                                                <input type="number" step="0.1" value={editConfig.strategy?.min_buy_score || 0} onChange={e => setEditConfig({...editConfig, strategy: {...editConfig.strategy, min_buy_score: parseFloat(e.target.value)}})} className="w-full bg-slate-900 p-4 rounded-xl text-white font-code text-2xl outline-none border border-slate-800 focus:border-cyan-500" />
                                            </div>
                                            <div className="bg-slate-950/40 p-5 rounded-3xl border border-slate-900/50 border-rose-500/20 col-span-2">
                                                <label className="text-[12px] font-black text-rose-400 uppercase mb-2 block tracking-widest">⏱️ Umbral Profit EOD (%)</label>
                                                <input type="number" step="0.1" value={editConfig.strategy?.eod_profit_threshold || 1.5} onChange={e => setEditConfig({...editConfig, strategy: {...editConfig.strategy, eod_profit_threshold: parseFloat(e.target.value)}})} className="w-full bg-slate-900 p-4 rounded-xl text-white font-code text-2xl outline-none border border-slate-800 focus:border-rose-500" />
                                            </div>
                                        </div>

                                        {/* BLOQUE EOD SELECTOR */}
                                        <div className="bg-slate-950/40 p-6 rounded-3xl border border-slate-900/50">
                                            <label className="text-[13px] font-black text-slate-400 uppercase mb-4 block tracking-widest font-code">🛡️ Control de Riesgo EOD (End of Day)</label>
                                            <div className="grid grid-cols-3 gap-3 mb-6">
                                                {[
                                                    {id: 'off', label: '🚫 OFF', color: 'slate'},
                                                    {id: 'selective', label: '🎯 SELECTIVE', color: 'blue'},
                                                    {id: 'full', label: '💣 FULL', color: 'rose'}
                                                ].map(opt => (
                                                    <button 
                                                        key={opt.id}
                                                        onClick={() => setEditConfig({...editConfig, strategy: {...editConfig.strategy, eod_strategy: opt.id}})}
                                                        className={`px-4 py-4 rounded-2xl text-[12px] font-black uppercase tracking-tighter transition-all border ${editConfig.strategy?.eod_strategy === opt.id ? `bg-${opt.color}-500/20 border-${opt.color}-500 text-${opt.color}-400 shadow-xl shadow-${opt.color}-500/10` : 'bg-slate-900 border-slate-800 text-slate-600 hover:border-slate-700'}`}
                                                    >
                                                        {opt.label}
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="bg-slate-900/50 p-5 rounded-2xl border border-slate-800/50 text-[13px] font-medium leading-relaxed">
                                                {editConfig.strategy?.eod_strategy === 'off' && <p className="text-slate-400 italic"><span className="text-white font-black not-italic block mb-1 uppercase tracking-widest">⚠️ Riesgo Overnight Activo</span>El bot no liquidará posiciones al cierre.</p>}
                                                {editConfig.strategy?.eod_strategy === 'selective' && <p className="text-blue-400/90 italic"><span className="text-blue-400 font-black not-italic block mb-1 uppercase tracking-widest">🎯 Asegurar Ganancias</span>Cierres con profit > {editConfig.strategy?.eod_profit_threshold || 1.5}%.</p>}
                                                {editConfig.strategy?.eod_strategy === 'full' && <p className="text-rose-400/90 italic"><span className="text-rose-400 font-black not-italic block mb-1 uppercase tracking-widest">💣 Seguridad Total</span>Se liquida TODA la cartera.</p>}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* WATCHLIST REUBICADA */}
                            <section className="glass p-10 rounded-[3rem] border border-slate-800/50">
                                <div className="flex justify-between items-center mb-8 border-b border-slate-800/30 pb-6">
                                    <h3 className="text-2xl font-black text-white font-code uppercase italic tracking-tighter">Centro de Activos</h3>
                                    <div className="flex gap-2 bg-slate-950 p-1 rounded-xl border border-slate-900">
                                        <input type="text" value={newSymbol} onChange={e => setNewSymbol(e.target.value.toUpperCase())} placeholder="SÍMBOLO..." className="bg-transparent text-[13px] font-black text-white px-4 py-2 outline-none w-32 font-code uppercase" />
                                        <button onClick={addSymbol} className="bg-blue-600 px-6 py-2 rounded-lg text-white font-black text-xs hover:bg-blue-500 transition shadow-lg shadow-blue-500/20">+</button>
                                    </div>
                                </div>
                                <div className="flex flex-wrap gap-3">
                                    {(editConfig?.watchlist || []).slice().sort().map(s => (
                                        <div key={s} className="tag-card px-5 py-3 rounded-2xl flex items-center gap-4 group hover:border-blue-500/30 transition-all bg-slate-900/50 border border-slate-800">
                                            <span className="text-sm font-black text-slate-300 group-hover:text-white font-code uppercase tracking-tighter">{s}</span>
                                            <button onClick={() => setEditConfig({...editConfig, watchlist: editConfig.watchlist.filter(x => x !== s)})} className="h-6 w-6 rounded-full bg-slate-950 border border-slate-800 text-xs text-slate-600 hover:bg-rose-600/20 hover:text-rose-400 transition flex items-center justify-center font-bold">×</button>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>

                        {/* COLUMNA DERECHA: INTELIGENCIA */}
                        <div className="flex flex-col">
                            {/* RADAR DE OPORTUNIDADES REDISEÑADO */}
                            <div className="glass p-10 rounded-[3rem] border border-slate-800/50 flex flex-col h-full shadow-2xl">
                                <div className="flex justify-between items-center mb-8 border-b border-slate-800/50 pb-6">
                                    <div>
                                        <h3 className="text-2xl font-black text-blue-400 font-code uppercase italic tracking-tighter">📡 Radar Táctico</h3>
                                        <p className="text-slate-500 text-[12px] font-code uppercase mt-1">Señales de Alta Probabilidad</p>
                                    </div>
                                    <div className="bg-blue-500/10 px-4 py-2 rounded-xl text-[12px] text-blue-400 font-black font-code uppercase border border-blue-500/20">
                                        Min Score: {config.strategy?.min_buy_score}
                                    </div>
                                </div>
                                
                                <div className="overflow-x-auto custom-scrollbar flex-1">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="border-b border-slate-900">
                                                <th className="py-5 px-3 text-[12px] font-black text-slate-400 uppercase font-code tracking-widest">Activo</th>
                                                <th className="py-5 px-3 text-[12px] font-black text-slate-400 uppercase font-code tracking-widest text-center">Score</th>
                                                <th className="py-5 px-3 text-[12px] font-black text-slate-400 uppercase font-code tracking-widest">Métricas</th>
                                                <th className="py-5 px-3 text-[12px] font-black text-slate-400 uppercase font-code tracking-widest text-right">Cotización</th>
                                                <th className="py-5 px-3 text-[12px] font-black text-slate-400 uppercase font-code tracking-widest text-right">Acción</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-900">
                                            {Object.entries(status.opportunities || {})
                                                .sort((a, b) => b[1].score - a[1].score)
                                                .map(([symbol, opp]) => (
                                                <tr key={symbol} className="group hover:bg-blue-500/5 transition-all">
                                                    <td className="py-6 px-3">
                                                        <div className="text-4xl font-black font-code text-white group-hover:text-blue-400 transition italic uppercase tracking-tighter leading-none">{symbol}</div>
                                                        <div className="text-[10px] text-slate-600 font-bold mt-1 uppercase tracking-widest font-code">{opp.timestamp?.split(' ')[1]}</div>
                                                    </td>
                                                    <td className="py-6 px-3 text-center">
                                                        <div className={`text-3xl font-black font-code ${opp.score >= 9 ? 'text-emerald-400' : opp.score >= 7 ? 'text-blue-400' : 'text-slate-500'}`}>
                                                            {opp.score?.toFixed(1)}
                                                        </div>
                                                    </td>
                                                    <td className="py-6 px-3">
                                                        <div className="flex flex-col gap-1">
                                                            <div className="flex items-center gap-2">
                                                                <span className="text-[11px] font-bold text-slate-400 font-code bg-slate-900 px-2 py-0.5 rounded border border-slate-800">RSI: {opp.metrics?.rsi?.toFixed(0) || 'N/A'}</span>
                                                            </div>
                                                            <span className={`text-[10px] font-black font-code uppercase px-2 py-0.5 rounded inline-block w-fit ${opp.metrics?.trend_score > 0 ? 'bg-emerald-500/10 text-emerald-500' : 'bg-rose-500/10 text-rose-500'}`}>
                                                                {opp.metrics?.trend_score > 0 ? '↗ Alcista' : '↘ Bajista'}
                                                            </span>
                                                        </div>
                                                    </td>
                                                    <td className="py-6 px-3 text-right">
                                                        <div className="text-2xl font-black font-code text-slate-200 tracking-tighter">${opp.price?.toLocaleString()}</div>
                                                    </td>
                                                    <td className="py-6 px-3">
                                                        <div className="flex justify-end gap-2">
                                                            <button onClick={() => manualBuy(symbol)} className="p-3 rounded-2xl bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 hover:bg-emerald-500 hover:text-black transition-all shadow-lg hover:shadow-emerald-500/20">
                                                                🚀
                                                            </button>
                                                            <button onClick={() => fetch(`/api/exclude?symbol=${symbol}`, {method: 'POST'})} className="p-3 rounded-2xl bg-rose-500/10 text-rose-500 border border-rose-500/20 hover:bg-rose-500 hover:text-white transition-all shadow-lg hover:shadow-rose-500/20">
                                                                🚫
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>


                        {/* GRÁFICO DE CURVA DE PATRIMONIO */}
                        <section className="glass p-10 rounded-[3rem] border border-slate-800/50 shadow-2xl overflow-hidden relative group">
                            <div className="absolute top-0 right-0 p-8 opacity-10 group-hover:opacity-20 transition-opacity">
                                <span className="text-8xl font-black font-code italic italic">EQUITY</span>
                            </div>
                            <div className="flex justify-between items-end mb-8 relative z-10">
                                <div>
                                    <h2 className="text-3xl font-black font-code tracking-tighter uppercase italic text-white">Curva de Rendimiento</h2>
                                    <p className="text-slate-500 text-[13px] font-code uppercase mt-1">Evolución del capital acumulado (ARS)</p>
                                </div>
                                <div className="text-right">
                                    <span className="text-[11px] font-black text-slate-500 uppercase tracking-widest block mb-1">Profit Histórico Total</span>
                                    <span className={`text-4xl font-black font-code ${status.history?.reduce((acc, h) => acc + (h.profit_amount || 0), 0) >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                        ${Math.round(status.history?.reduce((acc, h) => acc + (h.profit_amount || 0), 0)).toLocaleString()}
                                    </span>
                                </div>
                            </div>

                            <div className="h-[400px] w-full mt-4">
                                <canvas id="equityChart"></canvas>
                            </div>

                            {React.useEffect(() => {
                                // CANDADO: Si el gráfico ya existe en ventana, no lo volvemos a crear
                                // Esto cumple con que solo se actualice al refrescar la página manualmente
                                if (window.myChart) return; 

                                const ctx = document.getElementById('equityChart')?.getContext('2d');
                                if (!ctx || !status.history || status.history.length === 0) return;

                                const sortedHistory = [...status.history].sort((a, b) => a.date.localeCompare(b.date));
                                let cumulative = 0;
                                const dataPoints = sortedHistory.map(h => {
                                    cumulative += (h.profit_amount || 0);
                                    return { x: h.date, y: cumulative };
                                });

                                const gradient = ctx.createLinearGradient(0, 0, 0, 400);
                                gradient.addColorStop(0, 'rgba(59, 130, 246, 0.4)');
                                gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');

                                window.myChart = new Chart(ctx, {
                                    type: 'line',
                                    data: {
                                        labels: sortedHistory.map(h => h.date),
                                        datasets: [{
                                            label: 'Patrimonio Acumulado',
                                            data: dataPoints.map(p => p.y),
                                            borderColor: '#3b82f6',
                                            borderWidth: 4,
                                            pointBackgroundColor: '#3b82f6',
                                            pointBorderColor: '#0f172a',
                                            pointBorderWidth: 2,
                                            pointRadius: 4,
                                            pointHoverRadius: 8,
                                            fill: true,
                                            backgroundColor: gradient,
                                            tension: 0.4
                                        }]
                                    },
                                    options: {
                                        responsive: true,
                                        maintainAspectRatio: false,
                                        plugins: {
                                            legend: { display: false },
                                            tooltip: {
                                                backgroundColor: '#0f172a',
                                                titleFont: { family: 'Fira Code', size: 14 },
                                                bodyFont: { family: 'Fira Sans', size: 16, weight: 'bold' },
                                                padding: 20,
                                                borderColor: '#1e293b',
                                                borderWidth: 1,
                                                displayColors: false,
                                                callbacks: {
                                                    label: (context) => `Total: $${Math.round(context.raw).toLocaleString()}`
                                                }
                                            }
                                        },
                                        scales: {
                                            x: {
                                                grid: { display: false },
                                                ticks: { color: '#64748b', font: { family: 'Fira Code', size: 10 } }
                                            },
                                            y: {
                                                grid: { color: 'rgba(255,255,255,0.05)' },
                                                ticks: { 
                                                    color: '#64748b', 
                                                    font: { family: 'Fira Code', size: 11 },
                                                    callback: (value) => '$' + Math.round(value/1000) + 'k'
                                                }
                                            }
                                        }
                                    }
                                });
                            }, [status.history])}
                        </section>

                    {/* HISTORY */}
                    <section className="glass rounded-[3rem] border border-slate-800/50 overflow-hidden shadow-2xl">
                        <div className="p-10 border-b border-slate-800/50 flex justify-between items-center bg-slate-900/20">
                            <h2 className="text-3xl font-black italic uppercase tracking-tighter font-code">📜 Historial</h2>
                            <button onClick={syncHistory} className="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black text-[12px] uppercase tracking-widest font-code">Sincro IOL</button>
                        </div>
                        <div className="overflow-x-auto max-h-[500px] custom-scrollbar">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-slate-950 sticky top-0 text-slate-500 text-[11px] uppercase font-black tracking-widest border-b border-slate-800">
                                    <tr>
                                        <th className="px-10 py-8">Fecha</th>
                                        <th className="px-10 py-8">Símbolo</th>
                                        <th className="px-10 py-8 text-right">Profit (%)</th>
                                        <th className="px-10 py-8 text-right">Profit ($)</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-800/30">
                                    {(status.history || []).slice().sort((a, b) => b.date.localeCompare(a.date)).map((h, i) => (
                                         <tr key={i} className="hover:bg-blue-400/[0.02]">
                                             <td className="px-10 py-6 text-slate-500 font-mono text-[12px]">{h.date}</td>
                                             <td className="px-10 py-6 text-2xl font-black italic">{h.symbol}</td>
                                             <td className={`px-10 py-6 text-right font-black ${h.profit_pct >= 0 ? 'text-green-400' : 'text-red-400'}`}>{h.profit_pct?.toFixed(2)}%</td>
                                             <td className={`px-10 py-6 text-right font-black text-xl ${h.profit_amount >= 0 ? 'text-green-400' : 'text-red-400'}`}>${Math.round(h.profit_amount || 0).toLocaleString()}</td>
                                         </tr>
                                     ))}
                                </tbody>
                            </table>
                        </div>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
